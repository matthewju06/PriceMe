services:
  db:
    image: postgres:18-alpine
    container_name: polycontext-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: polyadmin
      POSTGRES_PASSWORD: PolySecurePassword2026!
      POSTGRES_DB: polycontext_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polyadmin -d polycontext_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: